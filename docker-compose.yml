services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alibaba-cloud-web
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
